<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Projeto estoque</title>
</head>
<body>
    <div class="products-container">
        <h1>Estoque de materiais</h1>
        <p>Lista de materiais</p>
        <a href="index.html">
            <button class="button">Cadastrar materiais</button>
        </a>
        <a href="estoque.html">
            <button class="button-estoque">Estoque/dashboard</button>
        </a>

        <div class="products">
            <fieldset>
                <label for="input-retirada">Quantidade a retirar:</label>
                <input type="number" id="input-retirada" placeholder="Ex: 4" min="1">
            </fieldset>
        </div>

        <footer>
            <div>
                <h2>Lista de materiais cadastrados</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Materiais</th>
                            <th>Quantidade</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-materiais"></tbody>
                </table>
            </div>
        </footer>
    </div>

    <script src="retirada.js"></script>
</body>
</html>
